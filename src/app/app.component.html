<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/">Mi Portfolio</a>
  </div>
  <div class="navbar-actions">
    <button *ngIf="!(authService.isLoggedIn() | async)" (click)="toggleAuthForms()">
      {{ showAuthForms ? 'Cerrar Autenticación' : 'Login / Registro' }}
    </button>
    <button *ngIf="authService.isLoggedIn() | async" (click)="logout()">
      Cerrar Sesión
    </button>
  </div>
</nav>

<div *ngIf="showAuthForms" class="auth-forms-container">
  <app-login-form (loginSuccess)="onLoginSuccess()"></app-login-form>
</div>

<router-outlet></router-outlet>
