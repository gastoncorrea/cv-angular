<div *ngIf="personalData" class="component personal-data">
    <div class="personal-img-container">
        <img [src]="getFullImageUrl(personalData.imagenUrl)" 
             [alt]="'Imagen de perfil de ' + (personalData.nombre || 'Usuario')" 
             class="center-img">
        <button class="btn btn-edit-photo" *ngIf="authService.isLoggedIn() | async" (click)="toggleUploadForm()">
            <i class="fa-solid fa-camera"></i>
        </button>
    </div>

    <!-- Formulario de subida de imagen -->
    <div *ngIf="showUploadForm" class="upload-form-container">
        <h3>Actualizar foto de perfil</h3>
        <div class="form-group">
            <input type="file" accept="image/*" (change)="onFileSelected($event)" class="form-control-file">
        </div>
        
        <!-- Vista previa de la imagen -->
        <div *ngIf="previewUrl" class="image-preview-container">
            <img [src]="previewUrl" alt="Vista previa de la imagen" class="image-preview">
        </div>

        <div class="form-actions">
            <button class="btn btn-primary" (click)="onUpload()" [disabled]="!selectedFile || isLoading">
                <span *ngIf="!isLoading">Subir</span>
                <span *ngIf="isLoading"><i class="fa fa-spinner fa-spin"></i> Subiendo...</span>
            </button>
            <button class="btn btn-secondary" (click)="cancelUpload()" [disabled]="isLoading">
                Cancelar
            </button>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger mt-2">
            {{ errorMessage }}
        </div>
    </div>
    
    <div class="personal-info-actions">
        <button class="btn btn-edit" *ngIf="authService.isLoggedIn() | async" (click)="editPersona()">
            <i class="fa-solid fa-pencil"></i>
        </button>
    </div>

    <div class="personal-info-text">
        <h1>{{ personalData.nombre }} {{ personalData.apellido }}</h1>
        <h3>PROGRAMMER</h3>
        <p>
            {{ calculateAge(personalData.fecha_nacimiento) }} Años
            <span *ngIf="personalData.num_celular"> | {{ personalData.num_celular }}</span>
        </p>
    </div>

    <app-residence-data [residences]="personalData.residencias"></app-residence-data>

    <div class="personal-description">
        <p>{{ personalData.descripcion_mi }}</p>
    </div>
</div>

<!-- No need for a separate loading state here, as it's handled by the parent HomeComponent -->
